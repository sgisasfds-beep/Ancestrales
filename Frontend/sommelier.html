<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesoría Sommelier | Chocolates Ancestrales</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&family=Playfair+Display:ital@0;1&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --cocoa: #4e342e;
            --taupe: #a1887f;
            --cream: #f9f7f2;
            --gold: #c5a059;
            --white: #ffffff;
            --transition-smooth: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            background-color: var(--cream);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            font-family: 'Montserrat', sans-serif;
            color: var(--cocoa);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navegación Minimalista */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(78, 52, 46, 0.05);
            background: rgba(249, 247, 242, 0.9);
            backdrop-filter: blur(10px);
        }

        .back-link {
            text-decoration: none;
            color: var(--cocoa);
            font-family: 'Cinzel';
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Contenedor de Chat */
        .chat-container {
            flex-grow: 1;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow: hidden;
        }

        .chat-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .chat-header h1 {
            font-family: 'Cinzel';
            font-size: 1.8rem;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .chat-header p {
            font-family: 'Playfair Display';
            font-style: italic;
            color: var(--taupe);
        }

        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding-right: 15px;
        }

        /* Burbujas de Mensaje */
        .message {
            max-width: 80%;
            padding: 20px 25px;
            border-radius: 4px;
            line-height: 1.8;
            font-size: 1rem;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sommelier-msg {
            align-self: flex-start;
            background: white;
            border-left: 2px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.02);
        }

        .user-msg {
            align-self: flex-end;
            background: var(--cocoa);
            color: var(--cream);
            font-weight: 300;
        }

        .message strong {
            color: var(--gold);
            font-weight: 600;
        }

        /* Barra de Entrada */
        .chat-input-area {
            padding: 30px 0;
            background: transparent;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            background: white;
            padding: 5px;
            border: 1px solid rgba(78, 52, 46, 0.1);
            border-radius: 4px;
        }

        input {
            flex-grow: 1;
            border: none;
            padding: 15px 20px;
            font-family: 'Montserrat';
            font-size: 1rem;
            outline: none;
        }

        .btn-send {
            background: var(--cocoa);
            color: var(--white);
            border: none;
            padding: 0 30px;
            font-family: 'Cinzel';
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-send:hover {
            background: var(--gold);
        }

        /* Scrollbar */
        #chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        #chat-messages::-webkit-scrollbar-thumb {
            background: var(--taupe);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <nav>
        <a href="tienda.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Regresar a la tienda
        </a>
        <img src="logo.png" alt="Logo" style="width: 60px;">
        <div style="width: 100px;"></div>
    </nav>

    <main class="chat-container">
        <header class="chat-header">
            <h1>El Sommelier</h1>
            <p>Asesoría personalizada para su selección ancestral</p>
        </header>

        <div id="chat-messages">
            <div class="message sommelier-msg">
                Bienvenido. ¿En qué puedo asistirle hoy respecto a nuestro
                catálogo?
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Escriba su consulta aquí..."
                    onkeypress="handleKey(event)">
                <button class="btn-send" onclick="sendMessage()">Consultar</button>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://ancestrales-1.onrender.com";

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-messages');
            const text = input.value.trim();

            if (!text) return;

            // Mensaje del Usuario
            appendMessage(text, 'user-msg');
            input.value = '';

            // Indicador de carga
            const loadingDiv = appendMessage('<em>El Sommelier está analizando...</em>', 'sommelier-msg');

            try {
                const res = await fetch(`${API_BASE_URL}/sommelier`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pregunta: text })
                });
                const data = await res.json();

                loadingDiv.remove(); // Quitamos el cargando

                if (data.respuesta) {
                    const formatted = data.respuesta
                        .trim()
                        .split(/\n\n/)
                        .map(p => `<p>${p.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>`)
                        .join('');
                    appendMessage(formatted, 'sommelier-msg');
                }
            } catch (e) {
                loadingDiv.innerHTML = "Lo sentimos, la cava de datos no está disponible actualmente.";
            }
        }

        function appendMessage(content, className) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }
    </script>

</body>

</html>
